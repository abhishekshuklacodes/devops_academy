<head>

<title>DevOps Academy — From Zero to Production-Ready</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;--bg2:#0f1420;--bg3:#151b2b;--bg4:#1a2035;
  --accent:#00e5a0;--accent2:#00b8d4;--accent3:#7c4dff;
  --warn:#ff6b35;--danger:#ff3d71;--success:#00e5a0;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --border:#1e293b;--border2:#2a3550;
  --glow:0 0 40px rgba(0,229,160,0.12);
  --radius:10px;--sidebar-w:280px;
}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,160,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
.topnav{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;background:rgba(10,14,23,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;gap:1rem}
.topnav-logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.95rem;color:var(--accent);display:flex;align-items:center;gap:.5rem;white-space:nowrap}
.topnav-logo .dim{color:var(--text3);font-weight:400}
.topnav-hamburger{display:none;background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer;padding:4px}
.topnav-right{margin-left:auto;display:flex;align-items:center;gap:1rem}
.topnav-right a{color:var(--text3);text-decoration:none;font-size:.78rem;font-weight:500;letter-spacing:.5px;text-transform:uppercase;transition:color .3s}
.topnav-right a:hover{color:var(--accent)}
.sidebar{position:fixed;top:56px;left:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;z-index:100;padding:1rem 0;transition:transform .3s}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar-phase-title{display:flex;align-items:center;gap:.5rem;padding:.55rem 1.25rem;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.sidebar-phase-title:hover{color:var(--text2);background:rgba(255,255,255,0.02)}
.sidebar-phase-title .arrow{margin-left:auto;transition:transform .3s;font-size:.55rem}
.sidebar-phase-title.expanded .arrow{transform:rotate(90deg)}
.sidebar-lessons{max-height:0;overflow:hidden;transition:max-height .4s ease}
.sidebar-lessons.open{max-height:800px}
.sidebar-lesson{display:flex;align-items:center;gap:.5rem;padding:.45rem 1.25rem .45rem 1.75rem;font-size:.8rem;color:var(--text3);cursor:pointer;transition:all .2s;border-left:3px solid transparent;text-decoration:none}
.sidebar-lesson:hover{color:var(--text);background:rgba(255,255,255,0.02)}
.sidebar-lesson.active{color:var(--accent);border-left-color:var(--accent);background:rgba(0,229,160,0.04)}
.sidebar-lesson .dot{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--text3);flex-shrink:0}
.sidebar-lesson.active .dot{background:var(--accent);border-color:var(--accent)}
.main{margin-left:var(--sidebar-w);margin-top:56px;min-height:calc(100vh - 56px);position:relative;z-index:1}
.lesson-page{display:none;padding:2.5rem 3rem 4rem;max-width:920px}
.lesson-page.active{display:block}
.lesson-header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.lesson-phase-tag{font-family:'JetBrains Mono',monospace;font-size:.63rem;color:var(--accent);background:rgba(0,229,160,0.08);padding:.2rem .6rem;border-radius:100px;display:inline-block;margin-bottom:.5rem}
.lesson-title{font-size:1.7rem;font-weight:800;margin-bottom:.4rem}
.lesson-subtitle{color:var(--text2);font-size:.92rem}
.block-wrap{margin:1.5rem 0;border-radius:var(--radius);overflow:hidden}
.block-header{display:flex;align-items:center;gap:.6rem;padding:.7rem 1.15rem;font-weight:600;font-size:.84rem;cursor:pointer;transition:background .2s;user-select:none}
.block-header .chevron{margin-left:auto;transition:transform .3s;font-size:.65rem;color:var(--text3)}
.block-header.expanded .chevron{transform:rotate(90deg)}
.block-body{max-height:0;overflow:hidden;transition:max-height .5s ease}
.block-body.open{max-height:15000px}
.block-content{padding:1.15rem 1.4rem}
.teach-block{border:1px solid rgba(0,229,160,0.15);background:rgba(0,229,160,0.02)}
.teach-block .block-header{background:rgba(0,229,160,0.06);color:var(--accent)}
.show-block{border:1px solid rgba(0,184,212,0.15);background:rgba(0,184,212,0.02)}
.show-block .block-header{background:rgba(0,184,212,0.06);color:var(--accent2)}
.lab-block{border:1px solid rgba(124,77,255,0.2);background:rgba(124,77,255,0.02)}
.lab-block .block-header{background:rgba(124,77,255,0.08);color:var(--accent3)}
.verify-block{border:1px solid rgba(0,229,160,0.15);background:rgba(0,229,160,0.02)}
.verify-block .block-header{background:rgba(0,229,160,0.06);color:var(--accent)}
.challenge-block{border:1px solid rgba(255,107,53,0.2);background:rgba(255,107,53,0.02)}
.challenge-block .block-header{background:rgba(255,107,53,0.08);color:var(--warn)}
.warn-block{border:1px solid rgba(255,61,113,0.2);background:rgba(255,61,113,0.02)}
.warn-block .block-header{background:rgba(255,61,113,0.08);color:var(--danger)}
.block-content h4{font-size:.92rem;font-weight:700;margin:1rem 0 .4rem;color:var(--text)}
.block-content h4:first-child{margin-top:0}
.block-content p{font-size:.86rem;color:var(--text2);margin-bottom:.65rem}
.block-content ul,.block-content ol{padding-left:1.25rem;margin-bottom:.65rem}
.block-content li{font-size:.84rem;color:var(--text2);margin-bottom:.3rem}
.block-content code{font-family:'JetBrains Mono',monospace;font-size:.76rem;background:var(--bg3);padding:.12rem .35rem;border-radius:4px;color:var(--accent2)}
.block-content strong{color:var(--text);font-weight:600}
.block-content a{color:var(--accent)}
.block-content .analogy{background:var(--bg3);border-left:3px solid var(--accent);padding:.65rem .9rem;border-radius:0 8px 8px 0;margin:.7rem 0;font-size:.83rem;color:var(--text2)}
.block-content .analogy::before{content:'💡 ';font-weight:600}
.block-content .docker-req{background:rgba(124,77,255,0.06);border:1px solid rgba(124,77,255,0.15);padding:.65rem .9rem;border-radius:var(--radius);margin:.7rem 0;font-size:.8rem}
.block-content .docker-req::before{content:'🐳 Docker: ';font-weight:600;color:var(--accent3)}
.block-content .objective{background:rgba(0,229,160,0.06);border:1px solid rgba(0,229,160,0.12);padding:.65rem .9rem;border-radius:var(--radius);margin-bottom:.9rem;font-size:.83rem}
.block-content .objective::before{content:'🎯 ';font-weight:600}
.block-content .expected-output{background:rgba(0,229,160,0.04);border:1px solid rgba(0,229,160,0.1);padding:.65rem .9rem;border-radius:var(--radius);margin:.7rem 0;font-size:.82rem}
.block-content .expected-output::before{content:'✅ Expected: ';font-weight:600;color:var(--accent);display:block;margin-bottom:.2rem}
.block-content .failure-case{background:rgba(255,61,113,0.04);border:1px solid rgba(255,61,113,0.12);padding:.65rem .9rem;border-radius:var(--radius);margin:.7rem 0;font-size:.82rem}
.block-content .failure-case::before{content:'❌ Failure: ';font-weight:600;color:var(--danger);display:block;margin-bottom:.2rem}
.block-content .reflection{background:var(--bg3);border:1px solid var(--border);padding:.65rem .9rem;border-radius:var(--radius);margin:.7rem 0;font-size:.82rem}
.block-content .reflection::before{content:'🧠 Reflect: ';font-weight:600;color:var(--accent2);display:block;margin-bottom:.2rem}
.block-content details{margin:.7rem 0}
.block-content summary{cursor:pointer;color:var(--accent);font-size:.85rem;font-weight:600}
.block-content details>div{padding:.65rem;background:var(--bg3);border-radius:8px;margin-top:.4rem;font-size:.83rem}
.terminal{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:.7rem 0;font-family:'JetBrains Mono',monospace;font-size:.78rem}
.term-bar{display:flex;align-items:center;gap:.3rem;padding:.5rem .9rem;background:var(--bg2);border-bottom:1px solid var(--border)}
.term-dot{width:8px;height:8px;border-radius:50%}
.term-dot.r{background:#ff5f56}.term-dot.y{background:#ffbd2e}.term-dot.g{background:#27c93f}
.term-title{margin-left:.6rem;font-size:.65rem;color:var(--text3)}
.term-body{padding:.9rem 1.1rem;overflow-x:auto;line-height:1.85;color:var(--text2);white-space:pre-wrap;word-break:break-word}
.term-body .cmd{color:var(--accent)}.term-body .path{color:var(--accent2)}.term-body .str{color:#ffd866}
.term-body .comment{color:var(--text3);font-style:italic}.term-body .flag{color:var(--accent3)}
.term-body .out{color:var(--text3)}.term-body .err{color:var(--danger)}.term-body .ok{color:var(--success)}
.yaml-display{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem 1.1rem;font-family:'JetBrains Mono',monospace;font-size:.76rem;line-height:1.85;overflow-x:auto;white-space:pre-wrap;margin:.7rem 0}
.yaml-display .key{color:var(--accent2)}.yaml-display .val{color:#ffd866}.yaml-display .comment{color:var(--text3);font-style:italic}
.file-tree{font-family:'JetBrains Mono',monospace;font-size:.76rem;line-height:2;color:var(--text2);background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem 1.1rem;white-space:pre-wrap;margin:.7rem 0}
.file-tree .dir{color:var(--accent2)}.file-tree .file{color:var(--text3)}.file-tree .imp{color:var(--accent)}
.lesson-nav{display:flex;justify-content:space-between;margin-top:2.5rem;padding-top:1.25rem;border-top:1px solid var(--border)}
.lesson-nav-btn{display:flex;align-items:center;gap:.35rem;padding:.5rem 1.1rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:.8rem;cursor:pointer;transition:all .3s;text-decoration:none;font-family:'Outfit',sans-serif}
.lesson-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.hero{min-height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:3rem 2rem;position:relative}
.hero-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .8rem;background:rgba(0,229,160,0.06);border:1px solid rgba(0,229,160,0.15);border-radius:100px;font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--accent);margin-bottom:1.5rem;animation:fadeUp .8s ease}
.hero-badge .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hero h1{font-size:clamp(2rem,5.5vw,4rem);font-weight:900;line-height:1.1;margin-bottom:1rem;animation:fadeUp .8s ease .1s both}
.hero h1 .gr{background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:1rem;color:var(--text2);max-width:560px;margin-bottom:1.75rem;animation:fadeUp .8s ease .2s both}
.hero-cta{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;animation:fadeUp .8s ease .3s both}
.btn{padding:.65rem 1.5rem;border-radius:var(--radius);font-family:'Outfit',sans-serif;font-weight:600;font-size:.87rem;text-decoration:none;transition:all .3s;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:.35rem}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 35px rgba(0,229,160,0.3)}
.btn-outline{background:transparent;color:var(--accent);border:1px solid rgba(0,229,160,0.25)}
.btn-outline:hover{background:rgba(0,229,160,0.06)}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.overview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:.9rem;margin-top:2.5rem;max-width:860px;width:100%}
.overview-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;text-align:left;transition:all .3s}
.overview-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.overview-card .oc-icon{font-size:1.4rem;margin-bottom:.4rem}
.overview-card h4{font-size:.83rem;font-weight:600;margin-bottom:.2rem}
.overview-card p{font-size:.72rem;color:var(--text3)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99}
.sidebar-overlay.show{display:block}
footer{border-top:1px solid var(--border);padding:1.5rem 2rem;text-align:center;font-size:.75rem;color:var(--text3);font-family:'JetBrains Mono',monospace}
footer a{color:var(--accent);text-decoration:none}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .topnav-hamburger{display:block}
  .lesson-page{padding:1.75rem 1.15rem 3rem}
}
@media(max-width:480px){.overview-grid{grid-template-columns:1fr}.hero h1{font-size:1.8rem}}
</style>

<body>
<div class="grid-bg"></div>
